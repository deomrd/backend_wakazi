services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: wakazi
      MYSQL_USER: wakazi
      MYSQL_PASSWORD: wakazi
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
